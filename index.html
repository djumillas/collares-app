<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background:#f5f5f5;
}

h2 { text-align:center; }

#app {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.card {
  background:white;
  border-radius:10px;
  padding:8px;
  text-align:center;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

button {
  margin-top:5px;
  width:100%;
  padding:6px;
}
</style>
</head>

<body>

<h2>Mis Collares</h2>
<div id="app">Cargando...</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwyecjRP4uxkhN2rP0u6JwtbQKE-5T6TW6ccC-PNOP1z7v58nVbKFNQ9GQN193jGBqALA/exec";

let data = [];

/* convertir imagen */
function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

/* cargar datos */
async function cargarDatos() {
  try {
    const res = await fetch(API_URL + "?t=" + Date.now());
    const text = await res.text();
    data = JSON.parse(text);
    render();
  } catch (error) {
    document.getElementById("app").innerHTML = "Error cargando datos";
    console.error(error);
  }
}

/* pintar */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {
    const stock = parseInt(collar.STOCK);
    const img = convertirDrive(collar["ENLACE A FOTOGRAFÍA DE PRODUCTO"]);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <h3>${collar.NOMBRE}</h3>
      <p>${collar.PRECIO}</p>
      <p>Stock: ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

/* vender */
async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);
  let stock = parseInt(collar.STOCK);

  if (stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        id: collar.REFERENCIA,
        stock: collar.STOCK
      })
    });

    render();

  } catch (error) {
    alert("Error de conexión");
  }
}

/* iniciar */
cargarDatos();

</script>

</body>
</html>
