<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Collares App</title>
  <style>
    body { font-family: Arial; padding: 10px; }
    .card { border:1px solid #ccc; padding:10px; margin:10px; border-radius:10px; }
    button { padding:10px; margin-top:5px; width:100%; }
  </style>
</head>
<body>

<h1>Mis Collares</h1>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnH4j-kifkU9zxYznxTmEQ8q8rwczTPWgWqmqVE74gZ0Lx-X3bR0084h0gnWJsb0WE6A/exec";

let data = [];

async function cargarDatos() {
  const res = await fetch(API_URL);
  data = await res.json();
  render();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${collar.NOMBRE}</h3>
      <p>Referencia: ${collar.REFERENCIA}</p>
      <p>Stock: ${collar.STOCK}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);

  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: collar.REFERENCIA,
      stock: collar.STOCK,
      vendidos: 1
    })
  });

  render();
}

cargarDatos();
</script>

</body>
</html>
