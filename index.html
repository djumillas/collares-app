<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<!-- 🔥 ESTO ES LA CLAVE -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares App</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  margin: 0;
}

/* grid responsive */
#app {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

/* tarjetas */
.card {
  border:1px solid #ccc;
  padding:8px;
  border-radius:10px;
  background:#fff;
  text-align:center;
}

/* imagen */
img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

/* texto más pequeño */
h3 { font-size:14px; margin:5px 0; }
p { font-size:12px; margin:2px 0; }

button {
  padding:6px;
  margin-top:5px;
  width:100%;
  font-size:12px;
}
</style>
</head>

<body>

<h2>Mis Collares</h2>
<div id="app">Cargando...</div>

<script>
const API_URL = "PEGA_AQUI_TU_URL";

let data = [];

function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

window.recibirDatos = function(json) {
  data = json;
  render();
};

function cargarDatos() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=recibirDatos&t=" + new Date().getTime();
  document.body.appendChild(script);
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {
    const stock = parseInt(collar.STOCK);
    const img = convertirDrive(collar["ENLACE A FOTOGRAFÍA DE PRODUCTO"]);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <h3>${collar.NOMBRE}</h3>
      <p>${collar.PRECIO}</p>
      <p>Stock: ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);
  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: collar.REFERENCIA,
      stock: collar.STOCK
    })
  });

  render();
}

cargarDatos();
</script>

</body>
</html>
