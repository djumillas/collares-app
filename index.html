<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Collares App</title>
  <style>
    body { font-family: Arial; padding: 10px; }
    .card { border:1px solid #ccc; padding:10px; margin:10px; border-radius:10px; }
    button { padding:10px; margin-top:5px; width:100%; }
  </style>
</head>
<body>

<h1>Mis Collares</h1>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxnH4j-kifkU9zxYznxTmEQ8q8rwczTPWgWqmqVE74gZ0Lx-X3bR0084h0gnWJsb0WE6A/exec";

let data = [];

async function cargarDatos() {
  try {
    const res = await fetch(API_URL);
    data = await res.json();
    render();
  } catch (error) {
    document.getElementById("app").innerHTML = "Error cargando datos";
    console.error(error);
  }
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${collar.nombre}</h3>
      <p>Stock: ${collar.stock}</p>
      <p>Vendidos: ${collar.vendidos}</p>
      <button onclick="vender(${collar.id})">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(id){
  const collar = data.find(c => c.id == id);

  collar.stock--;
  collar.vendidos++;

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify(collar)
    });

    render();
  } catch (error) {
    alert("Error al guardar");
    console.error(error);
  }
}

cargarDatos();
</script>

</body>
</html>
