<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collares</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
}

#app {
  padding: 10px;
}

.card {
  background: #1c1c1e;
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: #6c5ce7;
  color: white;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="header">Collares</div>
<div id="app">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5VFJFMHRwK-sWj5Jr2GXo9P4RRd0U8Us",
  authDomain: "collares-2709c.firebaseapp.com",
  projectId: "collares-2709c"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwI0qvu5Z2xPABYNvfGzEY0piPv0HX3No92PGEoc_sb_d-2dJJDVVzi0Oj4h7mqLusmYA/exec";

let data = [];

async function cargarDatos() {
  const snapshot = await getDocs(collection(db, "collares"));
  data = [];

  snapshot.forEach(docu => {
    const c = docu.data();
    data.push({ id: docu.id, ...c });
  });

  render();
}

async function vender(id) {

  const refDoc = doc(db, "collares", id);
  const snap = await getDoc(refDoc);

  if (!snap.exists()) return;

  let collar = snap.data();

  if (collar.stock <= 0) {
    alert("Sin stock");
    return;
  }

  // Firebase
  await updateDoc(refDoc, {
    stock: collar.stock - 1
  });

  // 🔥 MÉTODO DEFINITIVO (NO FALLA)
  const img = new Image();
  img.src = `${SCRIPT_URL}?referencia=${collar.referencia}`;

  cargarDatos();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.sort((a,b)=> (a.referencia||"").localeCompare(b.referencia||""));

  data.forEach(collar => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${collar.imagen}">
      <div class="card-content">
        <h3>${collar.referencia} - ${collar.nombre}</h3>
        <p>Stock: ${collar.stock}</p>
        <button>Vendido</button>
      </div>
    `;

    div.querySelector("button").addEventListener("click", () => {
      vender(collar.id);
    });

    app.appendChild(div);
  });
}

cargarDatos();

</script>

</body>
</html>
