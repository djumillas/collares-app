<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Collares App</title>

  <style>
    body { font-family: Arial; padding: 10px; }

    #app {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 10px;
    }

    .card {
      border:1px solid #ccc;
      padding:10px;
      border-radius:10px;
      background:#fff;
      text-align:center;
    }

    img {
      width:100%;
      height:150px;
      object-fit:cover;
      border-radius:8px;
    }

    h3 { font-size:14px; margin:5px 0; }
    p { font-size:12px; margin:2px 0; }

    button {
      padding:8px;
      margin-top:5px;
      width:100%;
      font-size:12px;
    }
  </style>
</head>

<body>

<h1>Mis Collares</h1>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzGDX4gI1UCyAFw-QjkeVyHplQ4ZYsu0CIsy51TmXCqRWScDMidQvvreLwW0BB1Tp99-A/exec";

let data = [];

function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

window.recibirDatos = function(json) {
  data = json;
  render();
};

function cargarDatos() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=recibirDatos&t=" + new Date().getTime();
  script.onerror = () => {
    document.getElementById("app").innerHTML = "Error cargando datos";
  };
  document.body.appendChild(script);
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {

    const stock = parseInt(collar.STOCK);
    const rawImg = collar["ENLACE A FOTOGRAFÍA DE PRODUCTO"];
    const img = convertirDrive(rawImg);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <h3>${collar.NOMBRE}</h3>
      <p>Ref: ${collar.REFERENCIA}</p>
      <p>${collar.PRECIO}</p>
      <p>Stock: ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);

  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: collar.REFERENCIA,
      stock: collar.STOCK
    })
  });

  render();
}

cargarDatos();
</script>

</body>
</html>
