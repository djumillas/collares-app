<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares App</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  margin: 0;
  background:#f5f5f5;
}

h2 {
  text-align:center;
}

/* GRID */
#app {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

/* CARD */
.card {
  border:1px solid #ddd;
  padding:8px;
  border-radius:12px;
  background:#fff;
  text-align:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

/* IMG */
img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

h3 { font-size:14px; margin:5px 0; }
p { font-size:12px; margin:2px 0; }

/* BUTTON */
button {
  padding:6px;
  margin-top:5px;
  width:100%;
  font-size:12px;
  background:#000;
  color:#fff;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>Mis Collares</h2>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwIXMasyrb83NJKX58m5UAyIvOeCbbr00ZZ3-ic06TOxL0ZCo5TQXBD5HAQz5_bPAL5Ew/exec";

let data = [];

/* 🔥 convertir links drive automáticamente */
function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

/* 🔥 JSONP */
window.recibirDatos = function(json) {
  data = json;
  render();
};

function cargarDatos() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=recibirDatos&t=" + new Date().getTime();
  script.onerror = () => {
    document.getElementById("app").innerHTML = "Error cargando datos";
  };
  document.body.appendChild(script);
}

/* 🔥 RENDER */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (!data || data.length === 0) {
    app.innerHTML = "No hay collares";
    return;
  }

  data.forEach(collar => {
    const stock = parseInt(collar.STOCK);
    const img = convertirDrive(collar["ENLACE A FOTOGRAFÍA DE PRODUCTO"]);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <h3>${collar.NOMBRE}</h3>
      <p>${collar.PRECIO}</p>
      <p>Stock: ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

/* 🔥 VENDER */
async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);
  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        id: collar.REFERENCIA,
        stock: collar.STOCK
      })
    });

    render();

  } catch (error) {
    alert("Error de conexión");
    console.error(error);
  }
}

/* INICIO */
cargarDatos();
</script>

</body>
</html>
