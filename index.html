<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Collares App</title>
  <style>
    body { font-family: Arial; padding: 10px; }
    .card { border:1px solid #ccc; padding:10px; margin:10px; border-radius:10px; }
    button { padding:10px; margin-top:5px; width:100%; }
  </style>
</head>
<body>

<h1>Mis Collares</h1>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzGDX4gI1UCyAFw-QjkeVyHplQ4ZYsu0CIsy51TmXCqRWScDMidQvvreLwW0BB1Tp99-A/exec";

let data = [];

// 🔥 IMPORTANTE: función global para JSONP
window.recibirDatos = function(json) {
  data = json;
  render();
};

// 🔥 Cargar datos
function cargarDatos() {
  const script = document.createElement("script");
  script.src = API_URL + "?callback=recibirDatos&t=" + new Date().getTime();
  script.onerror = () => {
    document.getElementById("app").innerHTML = "Error cargando datos";
  };
  document.body.appendChild(script);
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  if (!data || data.length === 0) {
    app.innerHTML = "No hay collares";
    return;
  }

  data.forEach(collar => {
    const stock = parseInt(collar.STOCK);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${collar.NOMBRE}</h3>
      <p><b>Referencia:</b> ${collar.REFERENCIA}</p>
      <p><b>Categoría:</b> ${collar.CATEGORIA || "-"}</p>
      <p><b>Precio:</b> ${collar.PRECIO}</p>
      <p><b>Stock:</b> ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);

  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        id: collar.REFERENCIA,
        stock: collar.STOCK
      })
    });

    render();
  } catch (error) {
    alert("Error al guardar");
    console.error(error);
  }
}

// 🚀 iniciar
cargarDatos();
</script>

</body>
</html>
