<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares App</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  padding: 10px;
  background:#f5f5f5;
}

h2 { text-align:center; }

#app {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.card {
  background:white;
  border-radius:10px;
  padding:8px;
  text-align:center;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

button {
  margin-top:5px;
  width:100%;
  padding:6px;
}
</style>
</head>

<body>

<h2>Mis Collares</h2>
<div id="app">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// 🔥 TU CONFIG YA PUESTA
const firebaseConfig = {
  apiKey: "AIzaSyA5VFJFMHRwK-sWj5Jr2GXo9P4RRd0U8Us",
  authDomain: "collares-2709c.firebaseapp.com",
  projectId: "collares-2709c",
  storageBucket: "collares-2709c.firebasestorage.app",
  messagingSenderId: "568653904079",
  appId: "1:568653904079:web:cecfbd6020e767b2839fba"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let data = [];

/* cargar datos */
async function cargarDatos() {
  const querySnapshot = await getDocs(collection(db, "collares"));
  data = [];

  querySnapshot.forEach((docu) => {
    data.push({ id: docu.id, ...docu.data() });
  });

  render();
}

/* pintar */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${collar.imagen ? `<img src="${collar.imagen}">` : ""}
      <h3>${collar.nombre}</h3>
      <p>${collar.precio}</p>
      <p>Stock: ${collar.stock}</p>
      <button onclick="vender('${collar.id}', ${collar.stock})">Vendido</button>
    `;

    app.appendChild(div);
  });
}

/* vender */
window.vender = async function(id, stock){

  if(stock <= 0){
    alert("Sin stock");
    return;
  }

  const ref = doc(db, "collares", id);

  await updateDoc(ref, {
    stock: stock - 1
  });

  cargarDatos();
}

cargarDatos();

</script>

</body>
</html>
