<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

#app {
  padding: 10px;
}

.card {
  background: #1c1c1e;
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  color: white;
}
</style>
</head>

<body>

<div class="header">Collares</div>
<div id="app">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5VFJFMHRwK-sWj5Jr2GXo9P4RRd0U8Us",
  authDomain: "collares-2709c.firebaseapp.com",
  projectId: "collares-2709c"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

/* 🔥 FUNCIÓN CLAVE (ARREGLA DRIVE) */
function convertirDrive(url){
  if(!url) return "";

  const match = url.match(/\/d\/(.*?)\//);

  if(match){
    return "https://lh3.googleusercontent.com/d/" + match[1];
  }

  return url;
}

/* cargar datos */
async function cargarDatos() {
  const querySnapshot = await getDocs(collection(db, "collares"));

  let html = "";

  querySnapshot.forEach(docu => {
    const c = docu.data();

    const img = convertirDrive(c.imagen);

    html += `
      <div class="card">
        ${img ? `<img src="${img}">` : ""}
        <div class="card-content">
          <h3>${c.referencia || ""} - ${c.nombre}</h3>
          <p>${c.precio}</p>
        </div>
      </div>
    `;
  });

  document.getElementById("app").innerHTML = html;
}

cargarDatos();

</script>

</body>
</html>
