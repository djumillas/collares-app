<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Collares App</title>
  <style>
    body { font-family: Arial; padding: 10px; }
    .card { border:1px solid #ccc; padding:10px; margin:10px; border-radius:10px; }
    button { padding:10px; margin-top:5px; width:100%; }
  </style>
</head>
<body>

<h1>Mis Collares</h1>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbzrRtxT5t2TwOOOOvzfBADqTxELEfDevHVF5paPO3ZmDBdUPGfoYPA7L6dNjis-f0ak4g/exec";

let data = [];

async function cargarDatos() {
  try {
    const res = await fetch(API_URL);
    data = await res.json();
    render();
  } catch (error) {
    document.getElementById("app").innerHTML = "Error cargando datos";
    console.error(error);
  }
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {
    const stock = parseInt(collar.STOCK);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <h3>${collar.NOMBRE}</h3>
      <p><b>Referencia:</b> ${collar.REFERENCIA}</p>
      <p><b>Categoría:</b> ${collar.CATEGORIA}</p>
      <p><b>Precio:</b> ${collar.PRECIO}</p>
      <p><b>Stock:</b> ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);

  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  try {
    await fetch(API_URL, {
      method: "POST",
      body: JSON.stringify({
        id: collar.REFERENCIA,
        stock: collar.STOCK
      })
    });

    render();
  } catch (error) {
    alert("Error al guardar");
    console.error(error);
  }
}

cargarDatos();
</script>

</body>
</html>
