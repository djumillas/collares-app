<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

#app {
  padding: 10px;
}

.card {
  background: #1c1c1e;
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

.card-content h3 {
  margin: 0;
  font-size: 15px;
  font-weight: bold;
}

.card-content p {
  margin: 2px 0;
  font-size: 13px;
  color: #aaa;
}

button {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  color: white;
}
</style>
</head>

<body>

<div class="header">Collares</div>
<div id="app">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5VFJFMHRwK-sWj5Jr2GXo9P4RRd0U8Us",
  authDomain: "collares-2709c.firebaseapp.com",
  projectId: "collares-2709c"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let data = [];

/* convertir drive */
function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

/* cargar datos */
async function cargarDatos() {
  const querySnapshot = await getDocs(collection(db, "collares"));
  data = [];

  querySnapshot.forEach((docu) => {
    const item = docu.data();
    item.imagen = convertirDrive(item.imagen);
    data.push({ id: docu.id, ...item });
  });

  render();
}

/* render */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${collar.imagen ? `<img src="${collar.imagen}">` : ""}
      <div class="card-content">
        <h3>${collar.referencia || ""} - ${collar.nombre}</h3>
        <p>${collar.precio}</p>
        <button onclick="vender('${collar.id}', ${collar.stock})">
          Vendido (${collar.stock})
        </button>
      </div>
    `;

    app.appendChild(div);
  });
}

/* vender */
window.vender = async function(id, stock){
  if(stock <= 0){
    alert("Sin stock");
    return;
  }

  const ref = doc(db, "collares", id);

  await updateDoc(ref, {
    stock: stock - 1
  });

  cargarDatos();
}

cargarDatos();

</script>

</body>
</html>
