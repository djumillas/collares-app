<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares App</title>

<style>
body {
  font-family: Arial;
  padding: 10px;
  margin: 0;
  background:#f5f5f5;
}

h2 { text-align:center; }

#app {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.card {
  border:1px solid #ddd;
  padding:8px;
  border-radius:12px;
  background:#fff;
  text-align:center;
}

img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

button {
  padding:6px;
  margin-top:5px;
  width:100%;
  background:black;
  color:white;
  border:none;
  border-radius:6px;
}
</style>
</head>

<body>

<h2>Mis Collares</h2>
<div id="app">Cargando...</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbypQyw73gMBt138BimXNYNObFglNXqHZMsRRmCfPb15jxdN78hXqEgkALey_ZceOyFSMg/exec";

let data = [];

function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

/* 🔥 CARGA NORMAL (NO JSONP) */
async function cargarDatos() {
  try {
    const res = await fetch(API_URL);
    data = await res.json();
    render();
  } catch (error) {
    document.getElementById("app").innerHTML = "Error cargando datos";
  }
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {
    const stock = parseInt(collar.STOCK);
    const img = convertirDrive(collar["ENLACE A FOTOGRAFÍA DE PRODUCTO"]);

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${img ? `<img src="${img}">` : ""}
      <h3>${collar.NOMBRE}</h3>
      <p>${collar.PRECIO}</p>
      <p>Stock: ${stock}</p>
      <button onclick="vender('${collar.REFERENCIA}')">Vendido</button>
    `;

    app.appendChild(div);
  });
}

async function vender(ref){
  const collar = data.find(c => c.REFERENCIA == ref);
  let stock = parseInt(collar.STOCK);

  if (isNaN(stock) || stock <= 0) {
    alert("Sin stock");
    return;
  }

  collar.STOCK = stock - 1;

  await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      id: collar.REFERENCIA,
      stock: collar.STOCK
    })
  });

  render();
}

cargarDatos();
</script>

</body>
</html>
