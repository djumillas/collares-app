<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

.header {
  text-align: center;
  padding: 15px;
  font-size: 18px;
}

#app {
  padding: 10px;
}

.card {
  background: #1c1c1e;
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  aspect-ratio: 1 / 1;
  object-fit: cover;
}

.card-content {
  padding: 10px;
}

button {
  width: 100%;
  padding: 8px;
  margin-top: 6px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(90deg, #6c5ce7, #a29bfe);
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="header">Collares</div>
<div id="app">Cargando...</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5VFJFMHRwK-sWj5Jr2GXo9P4RRd0U8Us",
  authDomain: "collares-2709c.firebaseapp.com",
  projectId: "collares-2709c"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

// 🔥 TU URL NUEVA YA PUESTA
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyIqARRhnCyEYmfkXilVL9oJWbMaFPm0y0L__cqJ28hTQaUQwyqUA1xgFcNb-Lm3r5jhg/exec";

let data = [];

function ordenarReferencias(a, b) {
  const numA = parseInt((a.referencia || "").replace(/\D/g, ""));
  const numB = parseInt((b.referencia || "").replace(/\D/g, ""));
  return numA - numB;
}

async function cargarDatos() {
  const querySnapshot = await getDocs(collection(db, "collares"));
  data = [];

  querySnapshot.forEach((docu) => {
    const item = docu.data();

    data.push({
      id: docu.id,
      nombre: item.nombre || "",
      referencia: item.referencia || "",
      precio: item.precio || "",
      stock: item.stock || 0,
      imagen: item.imagen || ""
    });
  });

  render();
}

window.vender = async function(id){

  const refDoc = doc(db, "collares", id);
  const snap = await getDoc(refDoc);

  if (!snap.exists()) return;

  let collar = snap.data();

  if(collar.stock <= 0){
    alert("Sin stock");
    return;
  }

  // 🔥 Firebase
  await updateDoc(refDoc, {
    stock: collar.stock - 1
  });

  // 🔥 Google Sheets (CLAVE)
  await fetch(SCRIPT_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      referencia: collar.referencia
    })
  });

  cargarDatos();
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.sort(ordenarReferencias);

  data.forEach(collar => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${collar.imagen ? `<img src="${collar.imagen}">` : ""}
      <div class="card-content">
        <h3>${collar.referencia} - ${collar.nombre}</h3>
        <p>${collar.precio}</p>
        <p>Stock: ${collar.stock}</p>
        <button onclick="vender('${collar.id}')">
          Vendido
        </button>
      </div>
    `;

    app.appendChild(div);
  });
}

cargarDatos();

</script>

</body>
</html>
