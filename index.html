<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Collares</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f0f0f;
  color: white;
}

/* HEADER */
.header {
  text-align: center;
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
}

/* GRID */
#app {
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

/* CARD */
.card {
  background: #1c1c1e;
  border-radius: 16px;
  overflow: hidden;
}

/* IMAGE */
.card img {
  width: 100%;
  height: 220px;
  object-fit: cover;
}

/* TEXT */
.card-content {
  padding: 10px;
}

.card-content h3 {
  margin: 0;
  font-size: 16px;
}

.card-content p {
  margin: 3px 0;
  font-size: 13px;
  color: #aaa;
}

/* BUTTON */
button {
  margin-top: 5px;
  width: 100%;
  padding: 8px;
  border-radius: 8px;
  border: none;
  background: #6c5ce7;
  color: white;
}

/* NAV BAR */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 60px;
  background: #1c1c1e;
  display: flex;
  justify-content: space-around;
  align-items: center;
  border-top: 1px solid #333;
}

.nav div {
  text-align: center;
  font-size: 12px;
  color: #aaa;
}

.nav .active {
  color: #a29bfe;
}
</style>
</head>

<body>

<div class="header">Collares</div>

<div id="app">Cargando...</div>

<div class="nav">
  <div class="active">+<br>Inventario</div>
  <div>☰<br>Datos</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, getDocs, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA5VFJFMHRwK-sWj5Jr2GXo9P4RRd0U8Us",
  authDomain: "collares-2709c.firebaseapp.com",
  projectId: "collares-2709c",
  storageBucket: "collares-2709c.firebasestorage.app",
  messagingSenderId: "568653904079",
  appId: "1:568653904079:web:cecfbd6020e767b2839fba"
};

const appFirebase = initializeApp(firebaseConfig);
const db = getFirestore(appFirebase);

let data = [];

/* convertir drive */
function convertirDrive(url){
  if(!url) return "";
  const match = url.match(/\/d\/(.*?)\//);
  if(match){
    return "https://drive.google.com/uc?export=view&id=" + match[1];
  }
  return url;
}

/* cargar datos */
async function cargarDatos() {
  const querySnapshot = await getDocs(collection(db, "collares"));
  data = [];

  querySnapshot.forEach((docu) => {
    const item = docu.data();
    item.imagen = convertirDrive(item.imagen);
    data.push({ id: docu.id, ...item });
  });

  render();
}

/* render */
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  data.forEach(collar => {

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      ${collar.imagen ? `<img src="${collar.imagen}">` : ""}
      <div class="card-content">
        <h3>${collar.referencia || ""}</h3>
        <p>${collar.nombre}</p>
        <button onclick="vender('${collar.id}', ${collar.stock})">
          Vendido (${collar.stock})
        </button>
      </div>
    `;

    app.appendChild(div);
  });
}

/* vender */
window.vender = async function(id, stock){
  if(stock <= 0){
    alert("Sin stock");
    return;
  }

  const ref = doc(db, "collares", id);

  await updateDoc(ref, {
    stock: stock - 1
  });

  cargarDatos();
}

cargarDatos();

</script>

</body>
</html>
